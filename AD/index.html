---
layout: default
title: AD
---

<div id="blog-AD">

	{% for ad in site.posts %}
		<article class="ad">
			{% if ad.external-url %}
				<h1>
					<a href="{{ ad.external-url }}">{{ ad.title }}</a> 
					<a class="anchor" href="{{ ad.url }}"></a>
				</h1>
			{% else %}
				<h1><a href="{{ ad.url }}">{{ ad.title }}</a></h1>
			{% endif %}
		</article>
	{% endfor %}

</div>
